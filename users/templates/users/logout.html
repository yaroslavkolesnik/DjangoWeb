{% extends 'myapp/base.html' %}
{% load i18n %}

{% block title %}{% trans "Выход" %}{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[50vh] bg-gray-50">
    <div class="bg-white p-8 rounded-lg shadow-md text-center max-w-md border border-gray-100">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">{% trans "Вы вышли из системы" %}</h2>
        <p class="text-gray-600 mb-6">{% trans "Спасибо, что заглянули. Ждем вас снова!" %}</p>

        <div class="flex justify-center gap-4">
            <a href="{% url 'login' %}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                {% trans "Войти снова" %}
            </a>
            <a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-900 font-medium py-2 px-4">
                {% trans "На главную" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
